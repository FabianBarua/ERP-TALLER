services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-taller_erp}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-taller_erp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  back:
    build:
      context: .
      dockerfile: Dockerfile.back
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      API_ONLY: "true"
      PORT: 3000
      DB_HOST: db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-taller_erp}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-cambia_esta_clave_secreta_por_una_segura}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  front:
    build:
      context: .
      dockerfile: Dockerfile.front
    expose:
      - "80"
    depends_on:
      back:
        condition: service_healthy
    networks:
      - dokploy-network
      - internal
    labels:
      - traefik.docker.network=dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge

volumes:
  pgdata:
